<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메가커피 단체 주문</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 구매 이력 팝업 모달 */
        .history-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        .history-modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .history-modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        .history-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .history-modal-header h2 {
            margin: 0;
            color: #667eea;
            font-size: 1.3rem;
        }

        .history-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .history-popup-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-popup-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .history-popup-name {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .history-popup-date {
            font-size: 0.9rem;
            color: #666;
        }

        .history-popup-empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .history-popup-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
        }

        .history-popup-link:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- 헤더 -->
    <header>
        <h1>☕ 메가커피 단체 주문</h1>
        <p>주문하실 음료를 선택해주세요</p>
    </header>

    <!-- 메인 컨테이너 -->
    <main class="container">


        <!-- 이름 선택 영역 -->
        <section class="name-section">
            <div class="name-section-header">
                <h2>👤 주문자 이름</h2>
                <button id="manageNamesBtn" class="settings-btn" title="이름 관리">⚙️</button>
            </div>
            <select id="nameSelect" class="name-select">
                <option value="">이름을 선택하세요</option>
                <!-- Firebase에서 동적으로 로드됩니다 -->
                <option value="custom">기타 (직접 입력)</option>
            </select>
            <input type="text" id="customName" class="custom-name-input" placeholder="이름을 입력하세요" style="display: none;"
                maxlength="20">
        </section>

        <!-- 주문 모드 전환 -->
        <section class="mode-section">
            <label class="checkbox-label">
                <input type="checkbox" id="multiOrderMode">
                <span>여러 개 주문하기</span>
            </label>
        </section>

        <!-- 카테고리 필터 -->
        <section class="category-section">
            <h2>📂 카테고리</h2>
            <div class="category-buttons" id="categoryButtons">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </section>

        <!-- 검색 영역 (위치 변경됨) -->
        <section class="search-section" style="margin-bottom: 20px;">
            <div class="search-container-fixed">
                <input type="text" id="searchInput" placeholder="🔍 선택한 카테고리 내 검색 (예: 라떼, 프라페)"
                    style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem;">
            </div>
        </section>

        <!-- 메뉴 리스트 -->
        <section class="menu-section">
            <div class="menu-section-header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin-bottom: 0;">🥤 음료 선택 <span id="menuCount"></span></h2>
                <button id="manageFavoritesBtn" class="btn-secondary" style="padding: 5px 10px; font-size: 0.9rem;">⭐
                    즐겨찾기 관리</button>
            </div>
            <div class="menu-list" id="menuList">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </section>

        <!-- 주문 담기 버튼 -->
        <section class="action-section">
            <button id="addToCartBtn" class="btn-primary">🛒 주문 담기</button>
            <button id="viewCartBtn" class="btn-secondary">📋 장바구니 보기</button>
        </section>

        <!-- 장바구니 영역 (모달) -->
        <div id="cartModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🛒 장바구니</h2>
                    <button class="close-btn" id="closeCartBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="cart-summary">
                        <p>총 <span id="totalOrders">0</span>건 / <span id="totalDrinks">0</span>잔</p>
                    </div>
                    <div class="cart-view-mode">
                        <label class="radio-label">
                            <input type="radio" name="cartViewMode" value="byPerson" checked>
                            <span>👤 주문자별 보기</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="cartViewMode" value="byMenu">
                            <span>☕ 메뉴순 보기</span>
                        </label>
                    </div>
                    <div id="cartList" class="cart-list">
                        <!-- Firebase에서 실시간으로 로드됩니다 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="clearCartBtn" class="btn-danger">🗑️ 전체 초기화</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 구매 이력 팝업 모달 -->
    <div id="historyPopupModal" class="history-modal">
        <div class="history-modal-content">
            <div class="history-modal-header">
                <h2>📋 구매 이력</h2>
                <button class="close-btn" onclick="closeHistoryPopup()">&times;</button>
            </div>
            <div class="history-modal-body">
                <div id="historyPopupList" class="history-popup-list">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 푸터 -->
    <footer>
        <p>Build: 2026.02.26 | Ver 1.26.2.22</p>
        <p>Developer: devmcjo@gmail.com</p>
        <p style="margin-top: 10px;">
            <a href="login.html" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.75rem;"
               onmouseover="this.style.color='rgba(255,255,255,0.8)'"
               onmouseout="this.style.color='rgba(255,255,255,0.5)'">관리자 로그인</a>
            <span style="color: rgba(255,255,255,0.3); margin: 0 5px;">|</span>
            <a href="#" onclick="openHistoryPopup(); return false;" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.75rem;"
               onmouseover="this.style.color='rgba(255,255,255,0.8)'"
               onmouseout="this.style.color='rgba(255,255,255,0.5)'">구매 이력</a>
        </p>
    </footer>

    <!-- Firebase SDK (CDN 방식) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- JavaScript 파일 로드 -->
    <script src="js/firebase-config.js"></script>
    <script src="js/version.js"></script>
    <script src="js/app.js"></script>

    <script>
        // Firebase 초기화
        initializeFirebase();

        // 구매 이력 팝업 열기
        function openHistoryPopup() {
            const modal = document.getElementById('historyPopupModal');
            modal.classList.add('show');
            loadHistoryPopup();
        }

        // 구매 이력 팝업 닫기
        function closeHistoryPopup() {
            const modal = document.getElementById('historyPopupModal');
            modal.classList.remove('show');
        }

        // 팝업 외부 클릭 시 닫기
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('historyPopupModal');
            if (e.target === modal) {
                closeHistoryPopup();
            }
        });

        // 구매 이력 데이터 로드
        function loadHistoryPopup() {
            const historyRef = firebase.database().ref('purchaseHistory');

            historyRef.once('value', (snapshot) => {
                const listElement = document.getElementById('historyPopupList');
                const data = snapshot.val();

                if (!data || Object.keys(data).length === 0) {
                    listElement.innerHTML = `
                        <div class="history-popup-empty">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📝</div>
                            <p>등록된 구매 이력이 없습니다.</p>
                        </div>
                    `;
                    return;
                }

                // 날짜 기준 내림차순 정렬
                const sortedEntries = Object.entries(data).sort((a, b) => {
                    return new Date(b[1].timestamp) - new Date(a[1].timestamp);
                });

                let html = '';
                sortedEntries.forEach(([key, item]) => {
                    const date = new Date(item.timestamp);
                    const dateStr = date.toLocaleDateString('ko-KR', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    });

                    html += `
                        <div class="history-popup-item">
                            <div class="history-popup-name">${escapeHtml(item.name)}</div>
                            <div class="history-popup-date">📅 ${dateStr}</div>
                        </div>
                    `;
                });

                // 관리자/매니저인 경우에만 관리 페이지 링크 표시
                const userRole = localStorage.getItem('coffeeOrder_role');
                if (userRole === 'admin' || userRole === 'manager') {
                    html += `<a href="history.html" class="history-popup-link" onclick="closeHistoryPopup()">구매 이력 관리 페이지로 이동 →</a>`;
                }

                listElement.innerHTML = html;
            });
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
