<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초기 메뉴 데이터 설정 - 메가커피 단체 주문</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .init-container {
            max-width: 600px;
        }

        .init-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .init-info h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .init-info p {
            color: #555;
            line-height: 1.8;
        }

        .menu-preview {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .category-item {
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .category-name {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .menu-count {
            font-size: 0.85rem;
            color: #666;
        }

        .btn-primary {
            padding: 15px 40px;
            font-size: 1.1rem;
        }

        .result-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .back-btn {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 0.95rem;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <header>
        <h1>🍹 초기 메뉴 데이터 설정</h1>
        <p>Firebase에 메뉴 데이터를 저장합니다</p>
    </header>

    <main class="container init-container">
        <button class="back-btn" onclick="location.href='index.html'">← 메인으로 돌아가기</button>

        <div class="init-info">
            <h3>📋 저장될 메뉴 데이터</h3>
            <p>아래 메뉴 데이터를 Firebase Realtime Database에 저장합니다.</p>

            <div class="menu-preview" id="menuPreview">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="saveBtn" onclick="saveMenuData()">메뉴 데이터 저장</button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div id="resultMessage" class="result-message"></div>
    </main>

    <footer>
        <p>Build: 2026.02.26</p>
        <p>Developer: devmcjo@gmail.com</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/version.js"></script>
    <script src="js/menu-data.js"></script>
    <script>
        // Firebase 초기화
        initializeFirebase();

        // 메뉴 미리보기 렌더링
        function renderMenuPreview() {
            const preview = document.getElementById('menuPreview');

            // 카테고리별로 그룹화
            const categoryGroups = {};
            CATEGORIES.forEach(cat => {
                if (cat !== '전체') {
                    categoryGroups[cat] = [];
                }
            });

            MENU_DATA.forEach(item => {
                if (categoryGroups[item.category]) {
                    categoryGroups[item.category].push(item.name);
                }
            });

            let html = '';
            Object.entries(categoryGroups).forEach(([category, items]) => {
                if (items.length > 0) {
                    html += `
                        <div class="category-item">
                            <div class="category-name">${category}</div>
                            <div class="menu-count">${items.length}개 메뉴</div>
                        </div>
                    `;
                }
            });

            html += `<div style="margin-top: 15px; text-align: center; color: #666; font-size: 0.9rem;">총 ${MENU_DATA.length}개 메뉴</div>`;

            preview.innerHTML = html;
        }

        // 메뉴 데이터 저장
        async function saveMenuData() {
            const saveBtn = document.getElementById('saveBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const resultDiv = document.getElementById('resultMessage');

            saveBtn.disabled = true;
            saveBtn.textContent = '저장 중...';
            progressBar.classList.add('show');
            resultDiv.className = 'result-message';
            resultDiv.style.display = 'none';

            try {
                const database = firebase.database();
                const menuRef = database.ref('menu');

                // 기존 데이터 확인
                const snapshot = await menuRef.once('value');
                if (snapshot.exists()) {
                    const overwrite = confirm('메뉴 데이터가 이미 존재합니다. 덮어쓰시겠습니까?');
                    if (!overwrite) {
                        saveBtn.disabled = false;
                        saveBtn.textContent = '메뉴 데이터 저장';
                        progressBar.classList.remove('show');
                        return;
                    }
                }

                // 진행률 업데이트
                progressFill.style.width = '20%';

                // 카테고리 저장
                const categoriesRef = menuRef.child('categories');
                const categoriesData = {};
                CATEGORIES.forEach((cat, index) => {
                    if (cat !== '전체') {
                        categoriesData[`cat${index}`] = { name: cat };
                    }
                });
                await categoriesRef.set(categoriesData);

                progressFill.style.width = '50%';

                // 메뉴 아이템 저장
                const itemsRef = menuRef.child('items');
                const itemsData = {};
                MENU_DATA.forEach((item, index) => {
                    itemsData[`item${index}`] = {
                        name: item.name,
                        category: item.category
                    };
                });
                await itemsRef.set(itemsData);

                progressFill.style.width = '100%';

                resultDiv.innerHTML = `
                    <strong>✅ 메뉴 데이터 저장 완료!</strong><br><br>
                    카테고리: ${Object.keys(categoriesData).length}개<br>
                    메뉴: ${MENU_DATA.length}개<br><br>
                    <a href="settings.html" style="color: #155724; font-weight: 600;">→ 설정 페이지로 이동</a>
                `;
                resultDiv.className = 'result-message success';

                saveBtn.textContent = '저장 완료';
            } catch (error) {
                console.error('저장 실패:', error);
                resultDiv.innerHTML = `<strong>❌ 오류 발생:</strong><br>${error.message}`;
                resultDiv.className = 'result-message error';
                saveBtn.disabled = false;
                saveBtn.textContent = '메뉴 데이터 저장';
                progressBar.classList.remove('show');
            }
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            renderMenuPreview();
        });
    </script>
</body>
</html>
